name: Build VirtualMic & WDM Driver

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install Windows Driver Kit (WDK)
        # Required to build the .sys kernel driver. Installing via winget.
        run: |
          winget install --id Microsoft.WindowsWDK.11 --exact --accept-package-agreements --accept-source-agreements
          # The WDK might require the SDK as well, but windows-latest usually has it.
          # We might need to refresh the environment or specify the path if msbuild doesn't find it.

      - name: Compile Virtual Audio Driver (Kernel Mode)
        run: |
          echo "⚠️ CRITICAL: ALWAYS ON BUILD TEST THE AUDIO DRIVER TO MAKE SURE THAT IT DOES NOT BSOD AND FUCK THE ENTIRE PC! ⚠️"
          
          # Build the C++ Driver Solution
          # We specify the target to ensure the driver project is built.
          msbuild Driver/VirtualMicDriver.sln /p:Configuration=Release /p:Platform=x64

      - name: Package Release Suite
        shell: pwsh
        run: |
          $releaseDir = "publish/Release"
          New-Item -ItemType Directory -Force -Path $releaseDir
          
          # Search for the .sys file to be robust against varying output paths
          $sysFile = Get-ChildItem -Path "Driver" -Filter "VirtualMic.sys" -Recurse | Select-Object -First 1
          if ($sysFile) {
              Copy-Item $sysFile.FullName $releaseDir/
              Write-Host "Found and copied: $($sysFile.FullName)"
          } else {
              Write-Error "VirtualMic.sys not found!"
          }
          
          # Copy INF
          Copy-Item "Driver/VirtualMic.inf" $releaseDir/
          
          # Archive Everything
          Compress-Archive -Path "$releaseDir/*" -DestinationPath VirtualMic-Suite.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VirtualMic-Suite
          path: VirtualMic-Suite.zip
          retention-days: 30
